version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     skillforge
      POSTGRES_PASSWORD: skillforge123
      POSTGRES_DB:       skillforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: DockerFile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override host to point at the db container
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload during development; remove for production
      - ./backend:/app
      - hf_cache:/app/.hf_cache
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --workers 1

  # ── Vite frontend ──────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  pgdata:
  hf_cache:
